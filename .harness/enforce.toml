# "Must-happen" rules. Compiled to deterministic Claude Code hooks / permission
# denies; advisory-only where a target has no hook layer.
[[rule]]
id = "block-env-read"
description = "Block reading secret env files"
event = "pre-tool"
match = "Read"
action = "deny"
when_files = ["./.env*"]
message = "Reading .env* is blocked by harness policy."

[[rule]]
id = "protect-dist"
description = "dist/ is tsc output — edit src/ and rebuild, never hand-edit"
event = "pre-tool"
match = "Edit|Write"
action = "deny"
when_files = ["./dist/**"]
message = "dist/ is generated by `npm run build` (tsc). Edit src/ and rebuild instead of hand-editing compiled output."
